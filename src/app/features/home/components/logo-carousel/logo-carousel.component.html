@if (logos.length > 0) {
<div class="w-full relative section-spacing">
    <div class="site-container relative mx-auto md:h-[134px] overflow-hidden">
        <div class="logo-track flex items-center w-max justify-start">
            @for (copy of [0, 1]; track copy) {
            <div class="logo-group flex items-center flex-shrink-0 gap-[48.51px] pr-[48.51px] md:gap-[60px] md:pr-[60px] lg:gap-[80px] lg:pr-[80px]">
                @for (logo of logos; track $index) {
                <div class="logo-item flex-shrink-0 flex items-center justify-center">
                    <img [src]="logo.src" [alt]="logo.alt" class="logo-img object-contain block max-h-[80px] w-auto"
                        [ngClass]="'logo-' + (($index % 5) + 1)" />
                </div>
                }
            </div>
            }
        </div>
        <div class="logo-fade-left hidden md:block"></div>
        <div class="logo-fade-right hidden md:block"></div>
    </div>
</div>
}
