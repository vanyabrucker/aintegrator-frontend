<section class="section-spacing w-full site-container">
    <div class="flex flex-col items-center gap-[40px] lg:gap-[80px]">

        <div class="flex flex-col items-center gap-[16px] lg:gap-[24px] w-full max-w-[342px] lg:max-w-none">
            <div class="flex items-start gap-[7.792px] lg:gap-[12px] h-[50px] lg:h-[77px] justify-center w-full">
                <div class="flex items-center justify-center">
                    <img src="assets/images/products/lia-chat.svg" [attr.alt]="title || 'LiaChat'"
                        class="h-[36px] lg:h-[56px] object-contain" />
                </div>
            </div>
            <p
                class="text-ai-gray-850 text-center font-['Poppins',_sans-serif] text-base md:text-xl font-normal leading-[148%]">
                {{ subtitle | localizedText }}
            </p>
        </div>

        <div
            class="w-full lg:max-w-[1144px] rounded-[12px] bg-ai-gray-100 p-[32px] lg:pt-[74px] lg:pb-[75px] lg:px-[80px] relative flex justify-center">

            <div
                class="w-full h-full rounded-[12px] bg-white flex flex-col justify-center items-center px-[24px] py-48 lg:py-64 lg:px-[32px]">

                <div
                    class="flex flex-col justify-end lg:justify-center items-center gap-[24px] lg:gap-[36px] w-full h-full">

                    <div class="flex flex-col items-center gap-[24px]">
                        <img src="assets/icons/Group 243.png" alt=""
                            class="w-[40px] h-[30.49px] lg:w-[55.539px] lg:h-[42.335px] object-contain">
                        <h3
                            class="text-center font-['Poppins',_sans-serif] text-[16px] lg:text-[24px] font-medium leading-normal">
                            <span class="lg:hidden">
                                <span class="text-ai-gray-950">{{ promptMobile | localizedText }}</span>
                            </span>
                            <span class="hidden lg:inline text-ai-gray-950">{{ promptDesktop | localizedText }}</span>
                        </h3>
                    </div>

                    <div
                        class="w-full max-w-[514px] h-[40px] lg:h-[55px] max-h-[55px] rounded-[28px] border border-ai-gray-300 bg-white shadow-[0_8px_24px_-5px_rgba(0,0,0,0.10)] flex items-center justify-between px-[20px] shrink-0">
                        <span
                            class="text-ai-gray-850 font-['Poppins',_sans-serif] text-[12px] lg:text-[14px] font-normal leading-normal whitespace-nowrap overflow-hidden text-ellipsis">{{
                            inputPlaceholder | localizedText }}</span>
                        <img src="assets/icons/Group 2281.png" alt=""
                            class="w-[24px] h-[24px] lg:w-[31px] lg:h-[31px] object-contain cursor-pointer">
                    </div>

                    <div class="flex flex-col items-center lg:items-start gap-[12px] w-full lg:hidden">
                        <div
                            class="flex h-[24px] px-[12px] py-[8px] justify-center items-center gap-[2px] rounded-[24px] border border-ai-gray-650">
                            <span
                                class="text-ai-gray-850 text-center font-['Poppins',_sans-serif] text-[12px] font-normal leading-normal">{{
                                (quickActions[0] || '') | localizedText }}</span>
                        </div>
                        <div
                            class="flex h-[24px] px-[12px] py-[8px] justify-center items-center gap-[2px] rounded-[24px] border border-ai-gray-650">
                            <span
                                class="text-ai-gray-850 text-center font-['Poppins',_sans-serif] text-[12px] font-normal leading-normal">Create
                                {{
                                (quickActions[1] || '') | localizedText }}</span>
                        </div>
                        <div
                            class="flex h-[24px] px-[12px] py-[8px] justify-center items-center gap-[2px] rounded-[24px] border border-ai-gray-650">
                            <span
                                class="text-ai-gray-850 text-center font-['Poppins',_sans-serif] text-[12px] font-normal leading-normal">{{
                                (quickActions[2] || '') | localizedText }}</span>
                        </div>
                    </div>

                </div>

            </div>

        </div>

    </div>
</section>
