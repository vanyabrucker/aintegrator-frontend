                  p-8 md:p-12 xl:p-16
                  rounded-[12px]
                  md:min-h-[420px] min-h-[355px]">

            <img src="assets/icons/Group 2769.png" alt=""

            <div class="flex flex-col items-start text-left max-w-[708px]">
